name: Keep Azure MCP Server Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MCP health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "https://amex-insight-mcp-fpatcrgcfwd6grhe.eastus2-01.azurewebsites.net/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  MCP server returned $STATUS — may be starting up"
          else
            echo "✅ MCP server is alive"
          fi
