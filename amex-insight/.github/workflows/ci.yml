name: CI — Lint · Type Check · Eval Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: amex-insight/package-lock.json

      - name: Install dependencies
        working-directory: amex-insight
        run: npm ci

      - name: Type check
        working-directory: amex-insight
        run: npm run type-check

      - name: Lint
        working-directory: amex-insight
        run: npm run lint

  eval:
    name: Eval Gate — Faithfulness ≥ 0.85
    runs-on: ubuntu-latest
    needs: quality
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MCP_SERVER_URL:    ${{ secrets.MCP_SERVER_URL }}
      MCP_SHARED_SECRET: ${{ secrets.MCP_SHARED_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: amex-insight/package-lock.json

      - name: Install dependencies
        working-directory: amex-insight
        run: npm ci

      - name: Run eval suite
        working-directory: amex-insight
        run: npm run eval
        # Blocks deploy if faithfulness < 0.85 vs baseline
        # or if citation accuracy < 80%

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: amex-insight

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [quality, eval]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:    ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:   ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:     "--prod"
          working-directory: amex-insight
